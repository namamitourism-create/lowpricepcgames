<script>

// HERO (same)
const track=document.getElementById("heroTrack");
for(let i=1;i<=4;i++){
let img=document.createElement("img");
img.src=`DL/DL${i}.jpg`;
track.appendChild(img);
}


// ===== GLOBAL UNIVERSAL DATES =====
const deal6_start = new Date("2026-05-10T12:00:00").getTime();
const deal6_end   = new Date("2026-05-19T12:00:00").getTime();

const deal7_show  = new Date("2026-05-17T12:00:00").getTime();
const deal7_start = new Date("2026-05-22T00:30:00").getTime();
const deal7_end   = new Date("2026-05-31T00:30:00").getTime();

const deal8_show  = new Date("2026-05-24T12:00:00").getTime();
const deal8_start = new Date("2026-05-29T00:30:00").getTime();
const deal8_end   = new Date("2026-06-07T00:30:00").getTime();

// STATIC DEALS (NEW)
const deal1_end = new Date("2026-05-08T12:00:00").getTime();
const deal2_end = new Date("2026-05-10T12:00:00").getTime();
const deal5_end = new Date("2026-04-30T00:00:00").getTime();


// ===== DEAL ENGINE =====
function handleDeal(cfg){
const card=document.getElementById(cfg.id);
const label=document.getElementById(cfg.timerId);

function update(){
let now=Date.now();

if(cfg.show && now<cfg.show){
card.style.display="none";
return;
}else{
card.style.display="block";
}

if(now<cfg.start){
card.className="card upcoming";

let diff=cfg.start-now;
let d=Math.floor(diff/86400000);
let h=Math.floor((diff%86400000)/3600000);
let m=Math.floor((diff%3600000)/60000);

label.innerText=`Starts in ${d}D : ${h}H : ${m}M`;
card.onclick=null;
return;
}

if(now>=cfg.start && now<cfg.end){
card.className="card live";
label.innerText=`₹${cfg.price}`;
card.onclick=()=>location.href=cfg.link;
return;
}

if(now>=cfg.end){
let removeTime=cfg.end+(5*86400000);

if(now>=removeTime){
card.style.display="none";
return;
}

card.className="card upcoming";
label.innerText="Deal Ended";
label.classList.add("ended");
card.onclick=null;
return;
}
}

update();
setInterval(update,1000);
}


// ===== STATIC DEAL HANDLER (NEW) =====
function handleStatic(cardIndex, endTime){
const card=document.querySelector(`.grid .card:nth-child(${cardIndex})`);
const price=card.querySelector(".card-price");

function update(){
let now=Date.now();

if(now>=endTime){
card.classList.add("upcoming");
price.innerText="Deal Ended";
price.classList.add("ended");
card.onclick=null;

if(now>=endTime+(5*86400000)){
card.style.display="none";
}
}
}

update();
setInterval(update,1000);
}

// APPLY STATIC
handleStatic(1,deal1_end);
handleStatic(2,deal2_end);

// DEAL5 REMOVE

let card=document.querySelector(".ended-card");

if(now>=deal5_end+(5*86400000)){
card.style.display="none";

// ===== APPLY DYNAMIC =====

id:"deal8Card",

show:deal8_show,
start:deal8_start,
end:deal8_end,
price:449,
link:"deal8.html"
});


// ===== SORT =====
function getPriority(card){
if(card.classList.contains("live")) return 1;

if(
card.classList.contains("ended") ||
card.innerText.toLowerCase().includes("ended")
) return 3;

return 2;
}

setInterval(()=>{
let grid=document.getElementById("grid");
let cards=[...grid.children];

cards.sort((a,b)=>getPriority(a)-getPriority(b));
cards.forEach(c=>grid.appendChild(c));
},1500);


function scrollToDeals(){
document.getElementById("dealsSection").scrollIntoView({behavior:"smooth"});
}

</script>
