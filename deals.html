<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Deals - Low Price PC Games</title>

<style>

*{
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

img{
  pointer-events: none;
}
  
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#0b1220;color:#fff;overflow-x:hidden;}

header{
  background:#0a0f1a;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1f2a44;
}
.logo{color:#4ea1ff;font-size:18px;font-weight:700;}

nav a{
  color:#cbd5e1;
  margin-left:15px;
  text-decoration:none;
  font-size:14px;
}
nav a:hover{color:#fff;}

.hero{position:relative;height:260px;overflow:hidden;}
.hero-track{position:absolute;width:100%;height:100%;display:flex;transition:1s;}
.hero-track img{width:100%;flex-shrink:0;object-fit:cover;opacity:0.75;}
.hero::after{content:"";position:absolute;width:100%;height:100%;background:linear-gradient(to right,#0b1220cc,#0b122099);}

.hero-content{
  position:absolute;
  top:50%;
  left:30px;
  transform:translateY(-50%);
  z-index:2;
}
.hero h1{font-size:28px;font-weight:700;}
.hero p{color:#cbd5e1;margin-top:5px;}
.hero button{
  margin-top:12px;
  padding:10px 18px;
  background:#4ea1ff;
  border:none;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

.section{padding:30px;}
.section h2{font-size:18px;margin-bottom:18px;color:#e5e7eb;}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  background:#111a2e;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:0.25s;
  border:1px solid rgba(255,255,255,0.04);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

.card img{
  width:100%;
  aspect-ratio:2/3;
  object-fit:cover;
}

.card-content{padding:12px;}

.card-title{font-size:14px;font-weight:600;color:#fff;}

.card-price{
  margin-top:4px;
  font-size:15px;
  font-weight:700;
  color:#ffd54f;
}

.ended{color:#ff3b3b !important;}

.ended-card{
  background:#1a1a1a;
  opacity:0.85;
}

/* STATES */
.upcoming{
  filter:grayscale(100%);
  opacity:0.7;
  cursor:not-allowed;
}

.live{
  filter:none;
  opacity:1;
  cursor:pointer;
}

@media(max-width:768px){
  .grid{grid-template-columns:repeat(2,1fr);}
  .hero{height:180px;}
  .hero h1{font-size:20px;}
}
</style>
</head>

<body>

<header>
<div class="logo">LOW PRICE PC GAMES</div>
<nav>
<a href="index.html">Home</a>
<a href="deals.html">Deals</a>
</nav>
</header>

<section class="hero">
<div class="hero-track" id="heroTrack"></div>
<div class="hero-content">
<h1>HOT DEALS</h1>
<p>Premium bundles at best prices</p>
<button onclick="scrollToDeals()">Explore Deals</button>
</div>
</section>

<section class="section" id="dealsSection">
<h2>🔥 Featured Deals</h2>

<div class="grid" id="grid">

<!-- EXISTING -->
<div class="card" onclick="location.href='deal1.html'">
<img src="DP/DP1.jpg">
<div class="card-content">
<div class="card-title">Horror Game Bundle</div>
<div class="card-price">₹499</div>
</div>
</div>

<div class="card" onclick="location.href='deal2.html'">
<img src="DP/DP2.jpg">
<div class="card-content">
<div class="card-title">Welcome May Pack</div>
<div class="card-price">₹299</div>
</div>
</div>

<div class="card" onclick="location.href='deal3.html'">
<img src="DP/DP3.jpg">
<div class="card-content">
<div class="card-title">Early Spring Deal</div>
<div class="card-price">₹349</div>
</div>
</div>

<div class="card" onclick="location.href='deal4.html'">
<img src="DP/DP4.jpg">
<div class="card-content">
<div class="card-title">Street Racing Pack</div>
<div class="card-price">₹449</div>
</div>
</div>

<div class="card ended-card ended">
<img src="DP/DP5.jpg">
<div class="card-content">

<div class="card-price ended">Ended 30th April</div>
</div>

<!-- DEAL 6 -->
<div class="card upcoming" id="deal6Card">
<img src="DP/DP6.jpg">
<div class="card-content">
<div class="card-title">Rainy Season Deals</div>
<div class="card-price" id="deal6Timer"></div>
</div>
</div>

<!-- DEAL 7 -->
<div class="card upcoming" id="deal7Card">
<img src="DP/DP7.jpe">
<div class="card-content">
<div class="card-title">The Jungle Pack</div>
<div class="card-price" id="deal7Timer"></div>
</div>
</div>

<!-- DEAL 8 -->
<div class="card upcoming" id="deal8Card">
<img src="DP/DP8.jpg">
<div class="card-content">
<div class="card-title">Early Summer Sale</div>
<div class="card-price" id="deal8Timer"></div>
</div>
</div>

</div>
</section>

<!-- ONLY SCRIPT UPDATED, REST SAME -->

<script>

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("touchstart", e => {
  if(e.touches.length > 1) e.preventDefault();
}, {passive:false});  
  
// HERO (same)
const track=document.getElementById("heroTrack");
for(let i=1;i<=4;i++){
let img=document.createElement("img");
img.src=`DL/DL${i}.jpg`;
track.appendChild(img);
}


// ===== GLOBAL UNIVERSAL DATES =====
const deal6_start = new Date("2026-05-10T12:00:00").getTime();
const deal6_end   = new Date("2026-05-19T12:00:00").getTime();

const deal7_show  = new Date("2026-05-17T12:00:00").getTime();
const deal7_start = new Date("2026-05-22T00:30:00").getTime();
const deal7_end   = new Date("2026-05-31T00:30:00").getTime();

const deal8_show  = new Date("2026-05-24T12:00:00").getTime();
const deal8_start = new Date("2026-05-29T00:30:00").getTime();
const deal8_end   = new Date("2026-06-07T00:30:00").getTime();

// STATIC DEALS (NEW)
const deal1_end = new Date("2026-05-08T12:00:00").getTime();
const deal2_end = new Date("2026-05-10T12:00:00").getTime();
const deal5_end = new Date("2026-04-30T00:00:00").getTime();


// ===== DEAL ENGINE =====
function handleDeal(cfg){
const card=document.getElementById(cfg.id);
const label=document.getElementById(cfg.timerId);

function update(){
let now=Date.now();

if(cfg.show && now<cfg.show){
card.style.display="none";
return;
}else{
card.style.display="block";
}

if(now<cfg.start){
card.className="card upcoming";

let diff=cfg.start-now;
let d=Math.floor(diff/86400000);
let h=Math.floor((diff%86400000)/3600000);
let m=Math.floor((diff%3600000)/60000);

label.innerText=`Starts in ${d}D : ${h}H : ${m}M`;
card.onclick=null;
return;
}

if(now>=cfg.start && now<cfg.end){
card.className="card live";
label.innerText=`₹${cfg.price}`;
card.onclick=()=>location.href=cfg.link;
return;
}

if(now>=cfg.end){
let removeTime=cfg.end+(5*86400000);

if(now>=removeTime){
card.style.display="none";
return;
}

card.className="card upcoming";
label.innerText="Deal Ended";
label.classList.add("ended");
card.onclick=null;
return;
}
}

update();
setInterval(update,1000);
}


// ===== STATIC DEAL HANDLER (NEW) =====
function handleStatic(cardIndex, endTime){
const card=document.querySelector(`.grid .card:nth-child(${cardIndex})`);
const price=card.querySelector(".card-price");

function update(){
let now=Date.now();

if(now>=endTime){
card.classList.add("upcoming");
price.innerText="Deal Ended";
price.classList.add("ended");
card.onclick=null;

if(now>=endTime+(5*86400000)){
card.style.display="none";
}
}
}

update();
setInterval(update,1000);
}

// APPLY STATIC
handleStatic(1,deal1_end);
handleStatic(2,deal2_end);

// DEAL5 REMOVE
setInterval(()=>{
let now=Date.now();
let card=document.querySelector(".ended-card");

if(now>=deal5_end+(5*86400000)){
card.style.display="none";
}
},1000);


// ===== APPLY DYNAMIC =====
handleDeal({
id:"deal6Card",
timerId:"deal6Timer",
start:deal6_start,
end:deal6_end,
price:399,
link:"deal6.html"
});

handleDeal({
id:"deal7Card",
timerId:"deal7Timer",
show:deal7_show,
start:deal7_start,
end:deal7_end,
price:449,
link:"deal7.html"
});

handleDeal({
id:"deal8Card",
timerId:"deal8Timer",
show:deal8_show,
start:deal8_start,
end:deal8_end,
price:449,
link:"deal8.html"
});


// ===== SORT =====
function getPriority(card){
if(card.classList.contains("live")) return 1;

if(
card.classList.contains("ended") ||
card.innerText.toLowerCase().includes("ended")
) return 3;

return 2;
}

setInterval(()=>{
let grid=document.getElementById("grid");
let cards=[...grid.children];

cards.sort((a,b)=>getPriority(a)-getPriority(b));
cards.forEach(c=>grid.appendChild(c));
},1500);


function scrollToDeals(){
document.getElementById("dealsSection").scrollIntoView({behavior:"smooth"});
}

</script>
</body>
</html>
