<style>

/* 🎁 BONUS POPUP */
.bonus-popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
  z-index:9999;
}

.bonus-popup.show{
  opacity:1;
  pointer-events:auto;
}

.bonus-box{
  width:260px;
  border-radius:16px;
  overflow:hidden;
  background:#0f172a;
  transform:scale(0.8);
  transition:0.4s;

  position:relative; /* 🔥 IMPORTANT */
}

.bonus-popup.show .bonus-box{
  transform:scale(1);
}

.bonus-box img{
  width:100%;
  aspect-ratio:4/5;
  object-fit:cover;
}

.claim-btn{
  position:absolute;

  bottom:18px;          /* 🔥 LOWER (main fix) */
  left:50%;
  transform:translateX(-50%);

  width:82%;            /* 🔥 MORE HORIZONTAL */
  padding:14px;

  border:none;
  border-radius:14px;

  background:#ffd54f;
  color:#000;
  font-weight:700;

  cursor:pointer;
  transition:0.25s;

  box-shadow:0 10px 25px rgba(0,0,0,0.7);
}

.claim-btn:hover{
  background:#ffca2c;
  transform:translateX(-50%) scale(1.05);
}

.bonus-box button:hover{
  background:#ffca2c;
}
  
*{
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

img{
  pointer-events: none;
}
  
.logout{
  color:#ff3b3b;
  margin-top:10px;
}

.logout:hover{
  background:rgba(255,59,59,0.1);
}
  
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#0b1220;color:#fff;scroll-behavior:smooth;overflow-x:hidden;}

header{
  background:#0a0f1a;
  padding:15px 40px;
  display:flex;
  align-items:center;
  gap:12px;
}

.right-group{
  display:flex;
  align-items:center;
  gap:15px;
  margin-left:auto;
}

nav a{color:#ccc;margin:0 8px;text-decoration:none;transition:0.3s;}
nav a:hover{color:#4ea1ff;}

.search-box{padding:8px 10px;border:none;border-radius:6px;width:180px;}

.cart-icon{position:relative;font-size:22px;cursor:pointer;}
#cartDot{position:absolute;top:-5px;right:-5px;width:10px;height:10px;background:red;border-radius:50%;display:none;}

@media(max-width:768px){

  nav{
    display:none;
  }

  header{padding:10px 12px;}
  .logo{font-size:16px;}
  .search-box{width:110px;}
}
 
/* HERO */
.hero{position:relative;height:350px;overflow:hidden;}
.hero-track{position:absolute;width:100%;height:100%;display:flex;transition:1s;}
.hero-track img{width:100%;flex-shrink:0;object-fit:cover;opacity:0.6;}
.hero::after{content:"";position:absolute;width:100%;height:100%;background:linear-gradient(to right,#0b122099,#0b1220cc);}
.hero-content{position:absolute;top:50%;left:40px;transform:translateY(-50%);z-index:2;animation:fadeUp 1s;}
.hero h1{font-size:40px;}
.hero button{margin-top:10px;padding:12px 26px;background:#4ea1ff;border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;transition:0.25s;}
.hero button:hover{transform:translateY(-3px);}

/* GRID */
.section{padding:40px;}
.games{display:grid;grid-template-columns:repeat(5,1fr);gap:25px;}

.game{
  background:#111a2e;
  padding:12px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  opacity:0;
  transform:translateY(20px);
  transition:0.4s;
}
.game.show{opacity:1;transform:translateY(0);}
.game:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 12px 30px rgba(0,0,0,0.6);}

.game img{width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:10px;transition:0.3s;}
.game:hover img{transform:scale(1.05);}

.game h3{font-size:14px;margin-top:8px;}
.game p{font-size:12px;color:#aaa;margin-top:5px;}

.stars{margin-top:6px;color:#ffc107;}
.reviews{color:#aaa;font-size:12px;margin-left:6px;}

.price-box{display:flex;gap:8px;margin-top:8px;align-items:center;}
.price{color:#ffd54f;font-size:18px;font-weight:bold;}
.old-price{text-decoration:line-through;color:#888;}
.discount{color:#ff3b3b;font-weight:bold;}

.actions{display:flex;flex-direction:column;gap:8px;margin-top:auto;}

.btn{padding:10px;border:none;border-radius:6px;cursor:pointer;transition:0.25s;}
.buy{background:#4ea1ff;color:#fff;}
.buy:hover{background:#3a8be0;}
.cart{background:#222;color:#fff;border:1px solid #555;}
.cart:hover{background:#333;}

footer{text-align:center;padding:20px;background:#0a0f1a;margin-top:30px;}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

// RENDER
const container=document.getElementById("gamesContainer");

for(let i=1;i<=129;i++){
let game=document.createElement("div");
game.className="game";

let title=i<=gameData.length?gameData[i-1].title:`Game ${i}`;
let desc=i<=gameData.length?gameData[i-1].desc:"High-quality PC game.";

let r=Math.random();

let reviews=(stars==="★★★★★"||stars==="★★★★⯪")?Math.floor(Math.random()*500)+300:Math.floor(Math.random()*250)+30;

const prices=[199,249,299];
let finalPrice=prices[Math.floor(Math.random()*3)];
let discount=Math.floor(Math.random()*40)+40;
let basePrice=Math.ceil((finalPrice*100/(100-discount))/100)*100;

game.innerHTML=`

// SCROLL
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){e.target.classList.add("show");}
});
});
document.querySelectorAll(".game").forEach(g=>observer.observe(g));

// CART
function addToCart(e){
let card = e.target.closest(".game");

let name = card.querySelector("h3").innerText;
let price = parseInt(card.querySelector(".price").innerText.replace("₹",""));
let img = card.querySelector("img").getAttribute("src");

let cart = JSON.parse(localStorage.getItem("cart_"+userEmail)) || [];

// check existing
let existing = cart.find(item => item.name === name);

if(existing){
  existing.qty += 1;
} else {
  cart.push({
    name: name,
    price: price,
    img: img,
    qty: 1
  });
}

localStorage.setItem("cart_"+userEmail, JSON.stringify(cart));
document.getElementById("cartDot").style.display="block";
}

  document.getElementById("logoutBtn").style.display="block";
}else{

}

/* LOGOUT FUNCTION */
function logoutUser(){
  localStorage.removeItem("user");
  localStorage.removeItem("userEmail");

  window.location.href="index.html";
}
  
// 🔥 FIXED BUY FUNCTION (ONLY CHANGE)
function buyGame(e,name,price,base,disc,index){
  e.stopPropagation();

  localStorage.setItem("order_"+userEmail, JSON.stringify({
    name:name,
    price:price,
    base:base,
    disc:disc,
    img:
index<=99 ? 'GLOGO/'+index+'.jpg' :
index<=198 ? 'GLOGO2/'+index+'.jpg' :
index<=297 ? 'GLOGO3/'+index+'.jpg' :
'GLOGO/'+index+'.jpg' // 🔥 THIS FIXES IMAGE ISSUE

  window.location.href="payment.html";
}

const q=this.value.toLowerCase();

let t=g.querySelector("h3").innerText.toLowerCase();
let d=g.querySelector("p").innerText.toLowerCase();
g.style.display=(t.includes(q)||d.includes(q))?"flex":"none";
});
});
function openMenu(){

}

function closeMenu(){
  document.getElementById("sideMenu").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}
function updateMenu(){
  const user = localStorage.getItem("user");

  const btn1 = document.getElementById("authBtn1");
  const btn2 = document.getElementById("authBtn2");

  const purchase = document.getElementById("purchaseBtn");
  const point = document.getElementById("pointBtn");

  if(user){
    // ✅ LOGGED IN
    btn1.innerText = "Profile";
    btn1.href = "profile.html";

    btn2.style.display = "none";

    purchase.href = "purchase.html";
    purchase.style.opacity = "1";
    purchase.style.pointerEvents = "auto";

    point.href = "pointstore.html";
    point.style.opacity = "1";
    point.style.pointerEvents = "auto";

  }else{
    // ❌ NOT LOGGED IN
    btn1.innerText = "Sign In";
    btn1.href = "signin.html";

    btn2.innerText = "Sign Up";
    btn2.href = "signup.html";
    btn2.style.display = "block";

    // 🔒 LOCK BUTTONS
    purchase.removeAttribute("href");
    purchase.style.opacity = "0.5";
    purchase.style.pointerEvents = "none";

    point.removeAttribute("href");
    point.style.opacity = "0.5";
    point.style.pointerEvents = "none";
  }
}

updateMenu();

</script>

  <div class="bonus-box">
  <img src="./noti/noti1.jpg">

  <!-- 🔥 BUTTON INSIDE IMAGE -->
  <button class="claim-btn" onclick="claimBonus()">CLAIM</button>
</div>
</div>
