<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- 🔥 FORCE DESKTOP SCALE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>  
  
/* 🔥 LOCK INTERACTION */
*{
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}
  
img{
  pointer-events:none;
}

/* 🔥 ALLOW DP IMAGE */
#dpImg{
  pointer-events:auto;
}
  
html,body{
  overflow-y:scroll;
  overflow-x:hidden;
  height:auto;
}
  
.main{
  min-height:100vh;
}  

body{
  -webkit-overflow-scrolling: touch;
}

/* NORMAL CSS (UNCHANGED LOOK) */
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#060d1a;color:#fff;}
.container{display:flex;}

.sidebar{
  width:220px;background:#050a14;height:100vh;padding:20px;
}
.sidebar h2{color:#4ea1ff;margin-bottom:25px;}
.sidebar a{display:block;padding:10px;color:#cbd5e1;text-decoration:none;}
.sidebar a:hover{color:#4ea1ff;}

.main{flex:1;padding:25px;}

.profile-header{
  background:#0f172a;
  border-radius:18px;
  overflow:hidden;
  position:relative;
}

.home-btn{
  position:absolute;
  top:12px;
  right:12px;

  width:34px;
  height:34px;

  border-radius:50%;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:16px;
  cursor:pointer;

  border:1px solid rgba(255,255,255,0.15);

  z-index:10;
}
  
.icon-btn{
  width:28px;height:28px;
  border-radius:50%;
  background:#1f2937;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:14px;
  position:absolute;
  display:none;

  transform: scaleX(-1); /* 🔥 FIX: flip pencil */
}

.banner-edit{bottom:10px;right:10px;}

.dp{
  width:110px;
  height:110px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid #4ea1ff;
  background:#0f172a;
}
.dp img{width:100%;height:100%;object-fit:cover;}

.dp-edit{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scaleX(-1); /* 🔥 FIX */
}

/* 🔥 MOBILE FIX (COPY FULL) */
@media(max-width:768px){
  /* 🔥 MOBILE ONLY FIX (SAFE) */

/* smaller cards ONLY on mobile */
.card img{
  aspect-ratio:1/1.4;
}

/* proper grid */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
  /* 🔥 SCALE WHOLE PAGE 40% SMALLER */

  /* REMOVE LEFT SIDEBAR */
  .sidebar{
    display:none !important;
  }

  /* FULL WIDTH */
  .container{
    flex-direction:column;
  }

  .main{
    width:100%;
    padding:12px;
  }

  /* PROFILE CENTER LIKE INSTAGRAM */
  .profile-content{
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  /* BIG PROFILE PIC */
  .dp{
  width:120px;
  height:120px;
  }

  .profile-header{
  border-radius:0;
}

  .banner{
  height:200px;

  background-size:cover;       /* 🔥 FILL + AUTO CROP */
  background-position:center;  /* 🔥 KEEP CENTER */
  background-repeat:no-repeat;

  background-color:#0f172a;
}
  
  /* USERNAME BIG */
  .user h2{
    font-size:20px;
    margin-top:10px;
  }

  /* DESCRIPTION FULL WIDTH */
  .desc-box{
    width:100%;
    text-align:center;
  }

  .box{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);

  padding:18px;
  border-radius:16px;

  text-align:center;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:6px;

  border:1px solid rgba(255,255,255,0.08);
}

  /* GAME GRID FIX */
  .grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
  /* 🔥 FINAL COMPACT FIX (PASTE HERE) */

.profile-content{
  gap:10px;
  padding:12px;
}

.banner{
  height:180px;
}

.user h2{
  font-size:18px;
}

.stats{
  gap:8px;
  margin-top:10px;
}

.box{
  padding:8px;
  font-size:12px;
}

.icon{
  font-size:22px;
  color:#4ea1ff;

  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
}

.label{
  font-size:13px;
  color:#cbd5e1;
}

.value{
  font-size:20px;
  font-weight:bold;
}  
  
.section{
  margin-top:25px;
}

.section h3{
  margin-bottom:12px;   /* 🔥 space from cards */
}
.grid{
  gap:8px;
}

.card-title{
  font-size:11px;
  padding:4px;
}
}
  
.profile-content{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:12px;
  padding:0;
  margin-top:-50px;   /* 🔥 THIS MAKES DP OVERLAP */
}

.user h2{font-size:20px;}

.username-edit{
  display:none;
  padding:6px;

  width:260px;      /* 🔥 SAME AS DESC BOX */

  background:#020617;
  border:1px solid #333;
  color:#fff;
  border-radius:6px;
  font-size:12px;
}

.desc-box{
  margin-top:6px;
  background:#020617;
  border:1px solid #222;
  padding:6px;
  border-radius:6px;
  font-size:12px;
  color:#ccc;
  width:260px;
}
.desc-box[disabled]{background:transparent;border:none;}

.edit-btn{
  margin-top:-6px;
  margin-left:0;
  background:#4ea1ff;
  padding:10px 16px;
  border:none;border-radius:8px;
  color:#fff;cursor:pointer;
}

.top-icons{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 10px;
}

.small-btn{
  width:30px;height:30px;
  border-radius:50%;
  background:#1f2937;
  display:none;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:20px;
  align-items:stretch;
}
  
.box{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);

  padding:16px 8px;
  border-radius:16px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  text-align:center;

  height:110px;   /* 🔥 SAME HEIGHT */

  gap:6px;

  border:1px solid rgba(255,255,255,0.08);
}

.icon{
  font-size:22px;
  color:#4ea1ff;
}

.label{
  font-size:12px;
  color:#cbd5e1;
  text-align:center;
}

.value{
  font-size:20px;
  font-weight:700;
  text-align:center;
}  
  
.section{margin-top:25px;}
.grid{
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);

  border-radius:14px;
  overflow:hidden;

  border:1px solid rgba(255,255,255,0.08);

  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 0 15px rgba(78,161,255,0.3);
}
  
.card img{
  width:100%;
  aspect-ratio:2/2.6;   /* 🔥 slightly shorter */
  object-fit:cover;
}
.card-title{
  padding:8px;
  font-size:12px;
  text-align:center;
  color:#cbd5e1;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>LPPG</h2>
<a href="index.html">Home</a>
<a>Profile</a>
<a href="purchase.html">Orders</a>
<a href="contact.html">Support</a>
<a onclick="logout()" style="color:red;">Logout</a>
</div>

<div class="main">

<div class="profile-header">

<div class="home-btn" id="homeBtn" onclick="location.href='index.html'">🏠</div>
  
<div class="banner" id="banner">
<div class="icon-btn banner-edit" id="bannerEdit" onclick="uploadBanner()">✎</div>
</div>

<div class="top-icons">
<div class="small-btn" id="closeBtn" onclick="toggleEdit()">✖</div>
<div class="small-btn" id="saveBtn" onclick="saveProfile()">✔</div>
</div>

<div class="profile-content">

<div class="dp">
<img id="dpImg" src="https://via.placeholder.com/100">
<div class="icon-btn dp-edit" id="dpEdit" onclick="uploadDP()">✎</div>
</div>

<div class="user">
<h2 id="username">User</h2>
<input id="usernameInput" class="username-edit">
<input id="desc" class="desc-box" value="No description" disabled>
</div>

<button class="edit-btn" onclick="toggleEdit()">👤 Edit Profile</button>

</div>
</div>

<div class="stats">

<div class="box">
  <div class="icon">★</div>
  <div class="label">LPPG Points</div>
  <div class="value" id="points">0</div>
</div>

<div class="box">
  <div class="icon">🎮</div>
  <div class="label">Games</div>
  <div class="value" id="inventory">0</div>
</div>

<div class="box">
  <div class="icon">🛒</div>
  <div class="label">Cart</div>
  <div class="value" id="cart">0</div>
</div>

<div class="box">
  <div class="icon">📊</div>
  <div class="label">Level</div>
  <div class="value" id="level">1</div>
</div>

</div>

<div class="section">
<h3>🎮 MY GAMES</h3>
<div class="grid" id="myGames"></div>
</div>

</div>
</div>

<script>

// 🔥 BLOCK RIGHT CLICK + LONG PRESS
document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("touchstart", e=>{
  if(e.touches.length>1) e.preventDefault();
},{passive:false});

// USER
let userEmail = localStorage.getItem("userEmail");

if(!userEmail){
  window.location.href = "signin.html";
}

let userKey = userEmail;

// 🔥 LOAD PROFILE (ONLY ONCE)
let profileData = JSON.parse(localStorage.getItem("profile_"+userKey));

if(!profileData){
  profileData = {
    name: userEmail.split("@")[0],
    desc: "No description",
    dp: "",
    banner: ""
  };

  localStorage.setItem("profile_"+userKey, JSON.stringify(profileData));
}
let username = document.getElementById("username");
let usernameInput = document.getElementById("usernameInput");
let dpImg = document.getElementById("dpImg");
let banner = document.getElementById("banner");
let desc = document.getElementById("desc");

// default username from email
let defaultName = userEmail.split("@")[0];

// final username
let finalName = profileData.name || defaultName;

// apply to UI
username.innerText = finalName;
usernameInput.value = finalName;

// 🔥 DEFAULT IMAGES
const defaultDP = "https://cdn-icons-png.flaticon.com/512/847/847969.png";
const defaultBanner = "linear-gradient(135deg,#2c2c2c,#1a1a1a)";

// PROFILE PIC
if(profileData.dp){
  dpImg.src = profileData.dp;
}else{
  dpImg.src = defaultDP;
}

// BANNER
if(profileData.banner){
  banner.style.backgroundImage = `url(${profileData.banner})`;
}else{
  banner.style.backgroundImage = defaultBanner;
}

// DESCRIPTION
if(profileData.desc) desc.value = profileData.desc;

if(profileData.name){
  username.innerText = profileData.name;
  usernameInput.value = profileData.name;
}
// DATA
let pointsVal=parseInt(localStorage.getItem("points_"+userKey)||0);
points.innerText=pointsVal;

let orders=JSON.parse(localStorage.getItem("orders_"+userKey)||"[]");
inventory.innerText=orders.length;

let cartItems=JSON.parse(localStorage.getItem("cart_"+userKey)||"[]");
cart.innerText=cartItems.length;

window.addEventListener("storage",()=>{
  let c = JSON.parse(localStorage.getItem("cart_"+userKey)||"[]");
  cart.innerText = c.length;
});  

level.innerText=Math.floor(pointsVal/100)+1;

// RECOMMEND
let data=JSON.parse(localStorage.getItem("userData"))||{views:[],search:[]};
let pool=[...data.views,...data.search];

if(pool.length===0){
  pool=[
    "GTA V","Elden Ring","God of War","Forza Horizon 5",
    "Cyberpunk 2077","Red Dead Redemption 2","Spider-Man 2","Far Cry 6",
    "Battlefield 2042","Assassin’s Creed Valhalla","The Witcher 3","Resident Evil 4 Remake"
  ];
}

pool.sort(()=>Math.random()-0.5);

let list=[...new Set(pool)].slice(0,12);

// 🔥 GAME NAME → IMAGE MATCH (WITH GLOGO + GLOGO2)
function getGameImage(name){

const games = [
"Assassin’s Creed Shadows","EA Sports FC 26","Mafia: The Old Country","Silent Hill F","Black Myth: Wukong",
"Call of Duty: Modern Warfare II (2022)","Call of Duty: Modern Warfare III (2023)","Nioh","Avatar: Frontiers of Pandora",
"Call of Duty: Black Ops Cold War","Battlefield 6","Crimson Desert","Resident Evil: Requiem","Forza Horizon 6",
"Death Stranding 2","Forza Horizon 5","Cricket 26","F1 25","Microsoft Flight Simulator 2020","Microsoft Flight Simulator 2024",
"WWE 2K26","Rust","Pragmata","Grand Theft Auto V","Red Dead Redemption 2","The Last of Us Part II Remastered",
"The Last of Us Part I","Euro Truck Simulator 2","Far Cry 6","Far Cry New Dawn","Far Cry 5","Far Cry 4","Far Cry 3",
"Dying Light: The Beast","Forza Horizon 4","MotoGP 2026","Resident Evil Biohazared","Kingdom Come Deliverance 2",
"Resident Evil Village","Ghost of tsushima director's cut","Street Fighter 6","EA Sports FC 25","EA Sports FC 24",
"FIFA 23","FIFA 22","FIFA 21","FIFA 20","SnowRunner","American Truck Simulator","Farming Simulator 25",
"Farming Simulator 22","Dying Light 2","Dying Light","Days Gone","No man's sky","Squad","ARMA 3",
"Resident Evil 2 Remake","Resident Evil 4 Remake","Outlast","Cities Skylines 2","Subnautica",
"Assassin’s Creed Origins","Assassin’s Creed Odyssey","Assassin’s Creed Valhalla","Assassin’s Creed Mirage",
"Mafia III","Mafia II","Watch Dogs Legion","Watch Dogs 2","Watch Dogs","Sleeping Dogs",
"Show of the tomb raider","Rise of the Tomb Raider","Hitman 2","Hitman World of assasiation",
"Farming Simulator 23","Battlefield 2042","Battlefield 5","Battlefield 1","Control",
"Cyberpunk 2077","Elden Ring","The Crew 2","The Witcher 3","Train Sim World 6",
"Assetto Corsa EVO","Forza Motorsport","Spider-Man 2","Spider-Man Remastered",
"God of War","God of War Ragnarok","Uncharted 4","Uncharted Lost Legacy",
"Horizon Forbidden West","Horizon Zero Dawn","Baldur’s Gate 3","Metro 2033 Exodus",
"Just Cause 4 Reloaded","Just Cause 3","Need for Speed Unbound","Need for Speed Heat"
];

let index = games.indexOf(name);

// 🔥 IMAGE LOGIC
if(index === -1) return "GLOGO/1.jpg";

index = index + 1;

// first 100 → GLOGO
if(index <= 100){
  return `GLOGO/${index}.jpg`;
}
// next → GLOGO2
else{
  return `GLOGO2/${index}.jpg`;
}

}
  
let myGrid = document.getElementById("myGames");

// 🔥 GET USER PURCHASED GAMES
let myGames = JSON.parse(localStorage.getItem("orders_"+userKey)||"[]");

if(myGames.length === 0){
  myGrid.innerHTML = "<p style='color:#888;'>No games purchased yet</p>";
}else{

  myGames.forEach(g=>{

    let gameName = typeof g === "string" ? g : (g.name || g.title || "");

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
    <img src="${getGameImage(gameName)}">
    <div class="card-title">${gameName}</div>
    `;

    myGrid.appendChild(div);

  });

} // 🔥 IMPORTANT FIX (THIS WAS MISSING)

// EDIT MODE
let edit=false;

function toggleEdit(){
edit=!edit;

desc.disabled=!edit;

username.style.display=edit?"none":"block";
usernameInput.style.display=edit?"block":"none";

dpEdit.style.display=edit?"flex":"none";
bannerEdit.style.display=edit?"flex":"none";

closeBtn.style.display=edit?"flex":"none";
saveBtn.style.display=edit?"flex":"none";

homeBtn.style.display = edit ? "none" : "flex";

/* 🔥 ADD THIS LINE */
document.querySelector(".edit-btn").style.display = edit ? "none" : "block";

}

// SAVE
function saveProfile(){

let data = JSON.parse(localStorage.getItem("profile_"+userKey)) || {};

data.desc = desc.value;
data.name = usernameInput.value;

localStorage.setItem("profile_"+userKey, JSON.stringify(data));

profileData = data;

location.reload();
}

// IMAGE
function uploadDP(){
  let i = document.createElement("input");
  i.type = "file";
  i.accept = "image/*";

  i.onchange = e => {
    let file = e.target.files[0];
    if(!file) return;

    let r = new FileReader();

    r.onload = () => {
      dpImg.src = r.result;
      saveImg("dp", file);
    };

    r.readAsDataURL(file);
  };

  i.click();
}

function uploadBanner(){
  let i = document.createElement("input");
  i.type = "file";
  i.accept = "image/*";

  i.onchange = e => {
    let file = e.target.files[0];
    if(!file) return;

    let r = new FileReader();

    r.onload = () => {
      banner.style.backgroundImage = `url(${r.result})`;
      saveImg("banner", file);
    };

    r.readAsDataURL(file);
  };

  i.click();
}

function saveImg(type, file){

  let reader = new FileReader();

  reader.onload = function(e){

    let img = new Image();

    img.onload = function(){

      let canvas = document.createElement("canvas");
      let ctx = canvas.getContext("2d");

      // 🔥 resize image
      let maxWidth = 400;
      let scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      let compressed = canvas.toDataURL("image/jpeg", 0.5); // 🔥 compress

      let data = JSON.parse(localStorage.getItem("profile_"+userKey)) || {};

      data[type] = compressed;

      localStorage.setItem("profile_"+userKey, JSON.stringify(data));

      // update UI
      if(type === "dp"){
        dpImg.src = compressed;
      }

      if(type === "banner"){
        banner.style.backgroundImage = `url(${compressed})`;
      }

    };

    img.src = e.target.result;
  };

  reader.readAsDataURL(file);
}
  
function logout(){
localStorage.removeItem("user");
localStorage.removeItem("userEmail");
location.href="index.html";
}
</script>

</body>
</html>
