<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Payment</title>

<style>

*{
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

img{
  pointer-events: none;
}
  
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#0b1220,#070d18);
  color:#fff;
  display:flex;
  justify-content:center;
}

/* WRAPPER */
.wrapper{
  width:100%;
  max-width:420px;
  padding:20px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
}

.logo{
  color:#4ea1ff;
  font-weight:700;
  font-size:18px;
}

.secure{
  font-size:12px;
  color:#aaa;
}

/* CARD */
.card{
  background:#111a2e;
  border-radius:16px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

h2{
  margin-bottom:12px;
  font-size:18px;
}

/* ORDER */
.order-item{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:6px;
  color:#ccc;
}

.total{
  margin-top:10px;
  font-size:20px;
  font-weight:bold;
  color:#ffd54f;
}

/* FORM */
.form-group{
  margin-top:12px;
}

.form-group label{
  font-size:12px;
  color:#aaa;
}

.form-group input{
  width:100%;
  margin-top:5px;
  padding:12px;
  border-radius:8px;
  border:1px solid #2a3555;
  background:#0f172a;
  color:#fff;
}

.error{
  font-size:11px;
  color:#ff4d4d;
  display:none;
}

/* BUTTON */
.btn{
  width:100%;
  margin-top:15px;
  padding:13px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#4ea1ff,#6bb4ff);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

/* PAYMENT */
.pay-option{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-radius:10px;
  background:#1a2440;
  margin-top:10px;
  cursor:pointer;
}

.pay-option:hover{
  background:#24305a;
}

.pay-option img{
  width:28px;
}

.hidden{display:none;}

.complete{
  background:green;
  display:none;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
  <div class="logo">LOW PRICE PC GAMES</div>
  <div class="secure">🔒 Secure Checkout</div>
</div>

<!-- ORDER -->
<div class="card">
  <h2>Order Summary</h2>
  <div id="orderList"></div>
  <div class="total" id="totalPrice"></div>
</div>

<!-- BILLING -->
<div class="card" id="billingBox">
  <h2>Billing Details</h2>

  <div class="form-group">
    <label>Name</label>
    <input id="name" placeholder="Full name">
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input id="email" placeholder="example@gmail.com">
    <div class="error" id="emailError">Invalid Gmail</div>
  </div>

  <div class="form-group">
    <label>Phone</label>
    <input id="phone" placeholder="10 digit number">
    <div class="error" id="phoneError">Invalid phone</div>
  </div>

  <div class="form-group">
    <label>Address</label>
    <input id="address" placeholder="Full address">
  </div>

  <button class="btn" id="processBtn" onclick="processOrder()" disabled>
    Proceed to Payment
  </button>
</div>

<!-- PAYMENT -->
<div class="card hidden" id="paymentBox">

  <div class="pay-option" onclick="payUPI()">
    <span>Google Pay</span>
    <img src="https://img.icons8.com/color/48/google-pay.png">
  </div>

  <div class="pay-option" onclick="payUPI()">
    <span>PhonePe</span>
    <img src="https://img.icons8.com/fluency/48/phonepe.png">
  </div>

  <div class="pay-option" onclick="payUPI()">
    <span>Paytm</span>
    <img src="https://img.icons8.com/color/48/paytm.png">
  </div>

  <!-- ✅ QR ADDED -->
  <div class="pay-option" onclick="showQR()">
    <span>Scan QR Code</span>
    <img src="https://img.icons8.com/ios-filled/50/ffffff/qr-code.png">
  </div>

</div>

<!-- ✅ QR BOX -->
<div class="card hidden" id="qrBox" style="text-align:center;">
  <img src="QR/QR1.jpg" style="width:100%;max-width:260px;border-radius:12px;">
  <p class="secure">Scan & Pay</p>

  <input id="txnid" placeholder="Enter Transaction ID"
  style="width:100%;margin-top:10px;padding:10px;border-radius:8px;border:none;background:#0f172a;color:#fff;">

  <button class="btn" onclick="verifyTxn()">Verify Payment</button>
</div>

<button class="btn complete" id="doneBtn" onclick="completeOrder()">
Payment Completed
</button>

</div>

<script>

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("touchstart", e => {
  if(e.touches.length > 1) e.preventDefault();
}, {passive:false});
  
let cart = JSON.parse(localStorage.getItem("checkoutCart")) || [];
let total = 0;

cart.forEach(i=>{
  total += i.price * i.qty;
  document.getElementById("orderList").innerHTML += `
    <div class="order-item">
      <span>${i.name} × ${i.qty}</span>
      <span>₹${i.price * i.qty}</span>
    </div>
  `;
});

document.getElementById("totalPrice").innerText="Total ₹"+total;

document.querySelectorAll("input").forEach(i=>i.addEventListener("input",validate));

function validate(){
let email=emailField().value;
let phone=phoneField().value;

let emailValid=email.endsWith("@gmail.com");
let phoneValid=/^[0-9]{10}$/.test(phone);

emailError().style.display=emailValid?"none":"block";
phoneError().style.display=phoneValid?"none":"block";

processBtn().disabled=!(nameField().value && emailValid && phoneValid && addressField().value);
}

function nameField(){return document.getElementById("name")}
function emailField(){return document.getElementById("email")}
function phoneField(){return document.getElementById("phone")}
function addressField(){return document.getElementById("address")}
function emailError(){return document.getElementById("emailError")}
function phoneError(){return document.getElementById("phoneError")}
function processBtn(){return document.getElementById("processBtn")}

function processOrder(){
localStorage.setItem("billing",JSON.stringify({
name:nameField().value,
email:emailField().value,
phone:phoneField().value,
address:addressField().value
}));

document.getElementById("billingBox").classList.add("hidden");
document.getElementById("paymentBox").classList.remove("hidden");
}

function payUPI(){
let upi="dj55alok-1@okhdfcbank";
let id="LP"+Date.now();
localStorage.setItem("orderID",id);

window.location.href=`upi://pay?pa=${upi}&pn=Alook&am=${total}&cu=INR`;

setTimeout(()=>{
document.getElementById("paymentBox").classList.add("hidden");
document.getElementById("doneBtn").style.display="block";
},4000);
}

// ✅ QR FUNCTIONS
function showQR(){
document.getElementById("paymentBox").classList.add("hidden");
document.getElementById("qrBox").classList.remove("hidden");

setTimeout(()=>{window.qrReady=true;},9000);
}

function verifyTxn(){
let txn=document.getElementById("txnid").value.trim();

if(!window.qrReady){
alert("Wait few seconds before verifying");
return;
}

if(txn.length<5){
alert("Enter valid transaction ID");
return;
}

document.getElementById("qrBox").classList.add("hidden");
document.getElementById("doneBtn").style.display="block";
}

function completeOrder(){
let b=JSON.parse(localStorage.getItem("billing"));
let id=localStorage.getItem("orderID");

let items="";
cart.forEach(i=>items+=`\n🎮 ${i.name} × ${i.qty}`);

let msg=`Hello Low Price PC Games,
Payment Successful✅

🛒Order details
${items}
💰Total: ₹${total}

Name: ${b.name}
Email: ${b.email}
Phone: ${b.phone}
Address: ${b.address}

🆔Order ID: ${id}

Please process the delivery`;

window.open(`https://api.whatsapp.com/send?phone=919395579036&text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
